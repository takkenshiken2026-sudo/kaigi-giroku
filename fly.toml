app = 'kaigi-giroku'
primary_region = 'nrt'

[build]

[env]
  SITE_URL = 'https://giroku.ai-master.jp'
  WHISPER_MODEL = 'large-v3'
  WHISPER_DEVICE = 'cpu'
  WHISPER_COMPUTE_TYPE = 'int8'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
